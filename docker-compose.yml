services:

  mysql:
    image: mysql:8.0
    container_name: gds-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    ports:
      - "${MYSQL_HOST_PORT:-3310}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_BACK}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - gds-network

  back-app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: gds-php81
    container_name: gds-back-app
    user: www-data
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${BACK_APP_SECRET}
      DATABASE_URL: ${BACK_DATABASE_URL}
      JWT_PASSPHRASE: ${BACK_JWT_PASSPHRASE}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      CODE_GENERATOR_URL: ${CODE_GENERATOR_URL}
      AWS_KEY: ${AWS_KEY:-mock}
      AWS_SECRET: ${AWS_SECRET:-mock}
    volumes:
      - ./apps/back:/var/www
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gds-network

  back-nginx:
    image: nginx:1.17-alpine
    container_name: gds-back-nginx
    restart: unless-stopped
    ports:
      - "${BACK_HOST_PORT:-9001}:80"
    volumes:
      - ./apps/back:/var/www
      - ./docker/nginx/back.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - back-app
    networks:
      - gds-network

  codegen-app:
    image: gds-php81
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    container_name: gds-codegen-app
    user: www-data
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${CODEGEN_APP_SECRET}
      BACK_URL: ${BACK_URL}
      AWS_KEY: ${AWS_KEY:-mock}
      AWS_SECRET: ${AWS_SECRET:-mock}
      MOCK_DEPLOY: ${MOCK_DEPLOY:-1}
      OUTPUT_DIR: ${OUTPUT_DIR:-/var/www/output/generated-apps}
      BASE_TEMPLATE_DIR: ${BASE_TEMPLATE_DIR:-/var/www/base-template}
      ZIPS_DIR: ${ZIPS_DIR:-/var/www/output/downloads}
      PUBLIC_DOWNLOADS_BASE_URL: ${PUBLIC_DOWNLOADS_BASE_URL:-http://localhost:9003/downloads}
    volumes:
      - ./apps/code-generator:/var/www
      - ./apps/base:/var/www/base-template:ro
      - ./output:/var/www/output
    depends_on:
      - back-app
    networks:
      - gds-network

  codegen-nginx:
    image: nginx:1.17-alpine
    container_name: gds-codegen-nginx
    restart: unless-stopped
    ports:
      - "${CODEGEN_HOST_PORT:-9003}:80"
    volumes:
      - ./apps/code-generator:/var/www
      - ./docker/nginx/codegen.conf:/etc/nginx/conf.d/default.conf:ro
      - ./output/downloads:/srv/downloads:ro
    depends_on:
      - codegen-app
    networks:
      - gds-network

  front:
    image: node:18-alpine
    container_name: gds-front
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${FRONT_HOST_PORT:-9000}:9000"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    volumes:
      - ./apps/front:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - back-nginx
    networks:
      - gds-network

networks:
  gds-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
